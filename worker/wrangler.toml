name = "fund-tracker-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Cron Trigger: 毎日 03:00 JST = 18:00 UTC
[triggers]
crons = ["0 18 * * *"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "fund-tracker-db"
database_id = "2c21a047-00a1-41b3-9333-05ef2d3d5909"  # wrangler d1 create fund-tracker-db で取得したIDに差し替え
migrations_dir = "src/db/migrations"

# 環境変数
[vars]
DEFAULT_FUND_ID = "emaxis-ac"  # 銘柄未指定時のフォールバック（funds.id）
DEFAULT_DROP_THRESHOLD = "5"
DEFAULT_WINDOW_HOURS = "24"
DEFAULT_COOLDOWN_MINUTES = "180"
APP_BASE_URL = "https://fund-tracker-worker.takuto-cocoa1911.workers.dev"
FRONTEND_URL = "https://fund-tracker-web-awo.pages.dev"

# Secrets (wrangler secret put で設定):
#   ENCRYPTION_KEY       — Webhook URL暗号化用キー
#   GOOGLE_CLIENT_ID     — Google OAuth Client ID
#   GOOGLE_CLIENT_SECRET — Google OAuth Client Secret
#   PRICE_API_KEY        — 外部価格API用（必要に応じて）
